# PRIDE Server — Docker Compose
#
# Copy .env.example → .env and fill in your values before running.
#
# Usage:
#   docker compose up            # Discord bot + web + misinfo, one shared vLLM
#
# DATA_DIR controls where the ChromaDB database is stored on your machine.
# Set it in .env, e.g.:  DATA_DIR=/mnt/storage/pride-db
# If unset, defaults to ./pride-data (next to this file).
#
# First run downloads ~20 GB of model weights into the hf_cache volume.

services:

  # ── Main entry: Discord bot + web + misinfo (one shared vLLM) ───────────────
  pride:
    image: pride-server:latest
    build: .
    command: ["python", "run.py", "--host", "0.0.0.0", "--port", "8080"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    env_file:
      - .env
    volumes:
      - hf_cache:/workspace/.cache/huggingface
      - torch_cache:/workspace/.cache/torch
      - ${DATA_DIR:-./pride-data}:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped

# Named volumes for ML model caches (managed by Docker, not user-configurable).
# The database (DATA_DIR) is a bind mount — set it in .env.
volumes:
  hf_cache:
  torch_cache:
